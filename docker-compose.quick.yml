version: '3.8'

# Quick start - app only (no ClamAV, runs in demo/safe mode)
# Use this if you just want to try ShieldVault immediately
# Real virus scanning requires: docker-compose -f docker-compose.yml up

services:
  app:
    build: .
    container_name: shield-vault-app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=shield_vault_jwt_super_secret_2024
      - ENCRYPTION_KEY=12345678901234567890123456789012
      - SIGNED_URL_SECRET=shield_vault_signed_url_secret_key
      - WEBHOOK_URL=
      - CLAMAV_HOST=localhost
      - CLAMAV_PORT=3310
    volumes:
      - shield-uploads:/app/uploads
      - shield-encrypted:/app/encrypted
      - shield-quarantine:/app/quarantine
      - shield-data:/app/data
    restart: unless-stopped

volumes:
  shield-uploads:
  shield-encrypted:
  shield-quarantine:
  shield-data:
